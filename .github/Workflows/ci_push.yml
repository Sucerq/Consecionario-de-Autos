name: CI/CD Dev Pipeline  # Pipeline principal para DEV

on:
  push:
    branches: [dev]  

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Pruebas + BD
  test-db:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: concesionario_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://neondb_owner:npg_z9ScYE0Vktef@ep-flat-grass-aiecwjxl-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      SSL_MODE: disable

    steps:
      - name:  Checkout
        uses: actions/checkout@v4

      - name:  Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name:  Cache dependencias
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name:  Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pip-audit pytest

      - name: Lint con Ruff
        run: ruff check src --output-format=github

      - name:  Formato con Ruff
        run: ruff format src --check

      - name: Verificar vulnerabilidades
        run: pip-audit

      - name:  Migración BD  REQUISITO
        run: python migrate_db.py

      - name:  Seed datos iniciales  REQUISITO
        run: python seed_db.py

      - name:  Pruebas completas
        run: pytest src/tests/ -v || pytest -v  # Soporte para tests faltantes

  # Job 2: Docker Build  REQUISITO EXTRA
  docker-build:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: test-db  # Solo si pruebas + BD pasan
    steps:
      - name:  Checkout
        uses: actions/checkout@v4

      - name:  Build Docker image
        run: |
          docker build -t concesionario-autos:${{ github.sha }} .
          docker run --rm concesionario-autos:${{ github.sha }} python -c "print(' Docker build OK')"

      - name:  Push a Docker Hub (opcional)
        if: github.repository_owner == 'tu-usuario'  # Cambia por tu usuario
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          docker tag concesionario-autos:${{ github.sha }} tuusuario/concesionario-autos:${{ github.sha }}
          docker push tuusuario/concesionario-autos:${{ github.sha }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}